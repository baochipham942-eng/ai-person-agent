<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 人物 PK 原型</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --panel: #fffdf8;
      --panel-strong: #fff8ea;
      --ink: #201c17;
      --muted: #776f64;
      --soft: #e7dfd2;
      --line: #ded4c4;
      --accent: #c85f20;
      --accent-2: #2f6f73;
      --risk: #9f2f2f;
      --deploy: #245d9a;
      --infra: #7657a8;
      --ok: #2c6b4f;
      --warn: #9a6b1f;
      --shadow: 0 18px 45px rgba(71, 52, 26, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(200, 95, 32, 0.11), transparent 34rem),
        linear-gradient(180deg, #fbfaf6 0%, var(--bg) 32rem);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid rgba(32, 28, 23, 0.1);
      border-radius: 8px;
      background: #201c17;
      color: #fff8ea;
      font-weight: 800;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text strong {
      display: block;
      font-size: 14px;
    }

    .brand-text span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) minmax(320px, 0.82fr);
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .hero-main,
    .source-panel,
    .section,
    .drawer {
      border: 1px solid rgba(91, 74, 51, 0.14);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.86);
      box-shadow: var(--shadow);
    }

    .hero-main {
      padding: 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 760;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: 34px;
      line-height: 1.14;
      letter-spacing: 0;
    }

    .hero-main p {
      max-width: 730px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .group-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .tab-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #4f463b;
      padding: 10px 12px;
      cursor: pointer;
      transition: 160ms ease;
    }

    .tab-button strong {
      display: block;
      font-size: 13px;
      font-weight: 760;
    }

    .tab-button span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .tab-button.active {
      border-color: rgba(200, 95, 32, 0.42);
      background: #fff2de;
      color: #8a3a12;
    }

    .source-panel {
      padding: 18px;
    }

    .source-panel h2,
    .section h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .source-panel p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .source-stat {
      border: 1px solid rgba(91, 74, 51, 0.11);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }

    .source-stat strong {
      display: block;
      font-size: 18px;
      line-height: 1;
    }

    .source-stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
    }

    .quality-note {
      margin-top: 12px;
      border-left: 3px solid var(--warn);
      background: #fff8e8;
      padding: 10px 12px;
      color: #6f501b;
      font-size: 12px;
      line-height: 1.6;
    }

    .pk-stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 0.72fr) minmax(0, 1fr);
      gap: 12px;
      margin-bottom: 18px;
      align-items: stretch;
    }

    .person-card,
    .verdict-card {
      border: 1px solid rgba(91, 74, 51, 0.14);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 16px;
      min-width: 0;
    }

    .person-head {
      display: flex;
      gap: 13px;
      align-items: center;
    }

    .avatar {
      width: 58px;
      height: 58px;
      flex: 0 0 58px;
      overflow: hidden;
      border-radius: 8px;
      background: #ebe2d4;
      border: 1px solid rgba(91, 74, 51, 0.14);
    }

    .avatar img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }

    .person-title {
      min-width: 0;
    }

    .person-title h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .person-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(91, 74, 51, 0.13);
      border-radius: 999px;
      background: #fff;
      color: #5f5548;
      padding: 5px 8px;
      font-size: 11px;
      line-height: 1;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .metric {
      border-radius: 8px;
      background: #f7f1e7;
      padding: 9px;
    }

    .metric strong {
      display: block;
      font-size: 16px;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .verdict-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      background: #201c17;
      color: #fff8ea;
    }

    .verdict-card .label {
      color: #d8b991;
      font-size: 12px;
      font-weight: 740;
    }

    .verdict-card h2 {
      margin: 9px 0 0;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .verdict-card p {
      margin: 12px 0 0;
      color: #e7ddcb;
      font-size: 12px;
      line-height: 1.7;
    }

    .section {
      margin-bottom: 18px;
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .matrix {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .matrix-row {
      display: grid;
      grid-template-columns: 156px repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid #eee5d7;
    }

    .matrix-row:last-child {
      border-bottom: 0;
    }

    .matrix-cell {
      min-width: 0;
      padding: 13px 14px;
      border-right: 1px solid #eee5d7;
      font-size: 12px;
      line-height: 1.55;
    }

    .matrix-cell:last-child {
      border-right: 0;
    }

    .matrix-head {
      background: #f8f1e7;
      color: #5f5548;
      font-weight: 750;
      font-size: 12px;
    }

    .dimension {
      background: #fbf7ee;
      font-weight: 780;
    }

    .stance {
      display: inline-flex;
      align-items: center;
      margin-bottom: 8px;
      border-radius: 999px;
      padding: 5px 8px;
      color: #fff;
      font-size: 11px;
      font-weight: 760;
      line-height: 1;
    }

    .risk { background: var(--risk); }
    .deploy { background: var(--deploy); }
    .infra { background: var(--infra); }
    .ok { background: var(--ok); }
    .warn { background: var(--warn); }

    .evidence-link {
      display: inline-flex;
      margin-top: 9px;
      border: 0;
      background: transparent;
      color: var(--accent);
      padding: 0;
      cursor: pointer;
      font-size: 12px;
      font-weight: 740;
    }

    .timeline-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .timeline {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }

    .timeline h3 {
      margin: 0 0 12px;
      font-size: 14px;
    }

    .event {
      position: relative;
      padding-left: 18px;
      margin-top: 12px;
    }

    .event:before {
      content: "";
      position: absolute;
      left: 2px;
      top: 4px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .event:after {
      content: "";
      position: absolute;
      left: 5px;
      top: 17px;
      bottom: -13px;
      width: 1px;
      background: #eadfce;
    }

    .event:last-child:after {
      display: none;
    }

    .event time {
      color: var(--accent);
      font-size: 11px;
      font-weight: 780;
    }

    .event p {
      margin: 4px 0 0;
      color: #4d4439;
      font-size: 12px;
      line-height: 1.6;
    }

    .report-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap: 12px;
    }

    .report-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }

    .report-card h3 {
      margin: 0;
      font-size: 14px;
    }

    .report-card ul {
      margin: 10px 0 0;
      padding-left: 18px;
      color: #4d4439;
      font-size: 12px;
      line-height: 1.7;
    }

    .source-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .source-item {
      display: block;
      border: 1px solid rgba(91, 74, 51, 0.12);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }

    .source-item strong {
      display: block;
      font-size: 12px;
      line-height: 1.4;
    }

    .source-item span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(23, 20, 17, 0.32);
      z-index: 20;
    }

    .drawer-backdrop.open {
      display: block;
    }

    .drawer {
      position: fixed;
      top: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 30;
      width: min(470px, calc(100vw - 32px));
      display: none;
      overflow: auto;
      padding: 18px;
    }

    .drawer.open {
      display: block;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .close-button {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .drawer-summary {
      border-left: 3px solid var(--accent);
      background: #fff5e4;
      padding: 10px 12px;
      color: #5f4320;
      font-size: 12px;
      line-height: 1.65;
      margin-bottom: 12px;
    }

    .empty-state {
      border: 1px dashed rgba(154, 107, 31, 0.45);
      border-radius: 8px;
      background: #fff9ec;
      padding: 12px;
      color: #79571d;
      font-size: 12px;
      line-height: 1.7;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .hero,
      .pk-stage,
      .report-grid,
      .timeline-grid {
        grid-template-columns: 1fr;
      }

      .verdict-card {
        min-height: 170px;
      }

      .matrix-row {
        grid-template-columns: 1fr;
      }

      .matrix-cell {
        border-right: 0;
        border-bottom: 1px solid #eee5d7;
      }

      .matrix-cell:last-child {
        border-bottom: 0;
      }

      .matrix-head {
        display: none;
      }

      .dimension {
        background: #201c17;
        color: #fff8ea;
      }

      .source-grid,
      .metric-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100vw - 20px, 1180px);
        padding-top: 16px;
      }

      h1 {
        font-size: 26px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .source-grid,
      .metric-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark">PK</div>
        <div class="brand-text">
          <strong>AI 人物观点 PK 原型</strong>
          <span>基于公开资料和可核验证据生成，重点看观点差异和变化。</span>
        </div>
      </div>
      <div class="meta">
        <span>2 组对照</span>
        <span>·</span>
        <span>证据可点开</span>
      </div>
    </header>

    <section class="hero">
      <div class="hero-main">
        <div class="eyebrow"><span class="dot"></span>观点对照，不是资料堆叠</div>
        <h1>先给判断，再把判断拆成矩阵、时间线和证据。</h1>
        <p>选择两位人物后，页面先给出核心判断，再展示观点矩阵、变化时间线和支撑来源。资料不够充分的地方会直接标出来，避免把谨慎推断包装成确定结论。</p>
        <div class="group-tabs" role="tablist" aria-label="PK 组切换">
          <button class="tab-button active" type="button" data-group="altman-amodei">
            <strong>Altman × Amodei</strong>
            <span>AGI、安全、治理</span>
          </button>
          <button class="tab-button" type="button" data-group="huang-su">
            <strong>黄仁勋 × 苏姿丰</strong>
            <span>AI 算力、基础设施</span>
          </button>
        </div>
      </div>
      <aside class="source-panel">
        <h2>证据预览</h2>
        <p id="source-copy">当前组已有足够多的直接观点来源，可展示完整矩阵和时间线。</p>
        <div class="source-grid" id="source-grid"></div>
        <div class="quality-note" id="quality-note"></div>
      </aside>
    </section>

    <main id="groups"></main>
  </div>

  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer" aria-live="polite">
    <div class="drawer-head">
      <div>
        <div class="eyebrow"><span class="dot"></span>证据抽屉</div>
        <h2 id="drawer-title">证据</h2>
      </div>
      <button class="close-button" id="drawer-close" type="button" aria-label="关闭">×</button>
    </div>
    <div class="drawer-summary" id="drawer-summary"></div>
    <div class="source-list" id="drawer-sources"></div>
  </aside>

  <script>
    const groups = {
      "altman-amodei": {
        sourceCopy: "当前组已有较多直接观点来源：Altman 有个人博客、访谈和媒体深访；Amodei 有个人文章、Anthropic 相关来源、CBS/Stanford 等资料。适合展示完整 PK。",
        qualityNote: "本页只基于已收录的公开资料形成判断。更严肃的结论需要逐条回到原始来源核验。",
        sourceStats: [
          { label: "Altman 来源", value: "88" },
          { label: "Amodei 来源", value: "40" },
          { label: "直接观点源", value: "18+" }
        ],
        people: [
          {
            name: "Sam Altman",
            avatar: "avatars/e174e984.webp",
            title: "CEO @ OpenAI",
            desc: "美国硅谷风险投资家；OpenAI CEO，ChatGPT / GPT-4 / Sora 等产品的组织推动者。",
            tags: ["AGI", "AI 产品化", "Agent", "大语言模型"],
            metrics: [{ k: "影响力", v: "71.0" }, { k: "观点摘录", v: "26" }, { k: "来源", v: "88" }]
          },
          {
            name: "Dario Amodei",
            avatar: "avatars/67bcb0b7.webp",
            title: "CEO @ Anthropic",
            desc: "Anthropic 联合创始人兼 CEO；将 AI 安全、可解释性和可控性作为公司核心方向。",
            tags: ["AI 安全", "对齐", "Constitutional AI", "大语言模型"],
            metrics: [{ k: "影响力", v: "73.8" }, { k: "观点摘录", v: "12" }, { k: "来源", v: "40" }]
          }
        ],
        verdict: {
          label: "核心判断",
          title: "Altman 更像加速型治理，Amodei 更像风险前置型治理。",
          copy: "两人都承认 AGI 和前沿模型风险，也都没有主张停下技术进展。差异在优先级：Altman 更强调部署、产品化和制度迭代；Amodei 更强调在能力跃迁前理解、约束和监管。"
        },
        matrix: [
          {
            dim: "AGI 时间表",
            left: ["deploy", "已进入起飞段", "从 OpenAI 使命、Reflections、The Gentle Singularity 等来源看，Altman 把 AGI 视作已经临近、且会以渐进方式改变经济和社会。"],
            right: ["risk", "临近但必须先布安全边界", "Amodei 的材料同样认为强大 AI 不远，但表达重心落在可解释性、可控性和制度准备。"],
            diff: "时间判断接近，行动节奏不同：Altman 偏推动落地，Amodei 偏提前减速带。",
            evidence: "agi"
          },
          {
            dim: "安全风险",
            left: ["warn", "承认高风险，仍保持建设叙事", "Altman 早期公开文章对机器智能风险表达很强，但近期更多把风险放进产品推进与社会适配框架。"],
            right: ["risk", "风险是组织定位的一部分", "Amodei 的公开资料明显围绕 AI 风险、可解释性和 Constitutional AI 展开。"],
            diff: "Altman 的安全是推进 AGI 的治理条件；Amodei 的安全更像公司存在理由。",
            evidence: "safety"
          },
          {
            dim: "监管与公共政策",
            left: ["deploy", "支持制度化治理", "Altman 的媒体与访谈材料更常出现社会影响、监管、董事会治理和信任问题。"],
            right: ["risk", "更主动进入政策争论", "Amodei 有反对监管暂停令、出口管制、American AI leadership 等材料，政策表达更尖锐。"],
            diff: "Altman 更像平台责任叙事；Amodei 更愿意把具体政策立场摆出来。",
            evidence: "policy"
          },
          {
            dim: "技术路线",

            <div class="report-card">
              <h3>共同点</h3>
              <ul>${group.report.common.map(item => `<li>${item}</li>`).join("")}</ul>
            </div>
            <div class="report-card">
              <h3>差异点</h3>
              <ul>${group.report.differences.map(item => `<li>${item}</li>`).join("")}</ul>
            </div>
          </div>
        </section>
      `;
    }

    function openEvidence(key) {
      const group = groups[activeGroup];
      const evidence = group.sources[key];
      if (!evidence) return;

      drawerTitle.textContent = evidence.title;
      drawerSummary.textContent = evidence.summary;
      drawerSources.innerHTML = evidence.items.map(item => `
        <a class="source-item" href="${normalizeHref(item[1])}" target="_blank" rel="noreferrer">
          <strong>${item[0]}</strong>
          <span>${item[1]}</span>
          <span>${item[2]}</span>
        </a>
      `).join("");
      drawer.classList.add("open");
      backdrop.classList.add("open");
    }

    function normalizeHref(value) {
      if (value.startsWith("http")) return value;
      if (value.includes(".")) return "https://" + value;
      return "#";
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      backdrop.classList.remove("open");
    }

    document.querySelectorAll(".tab-button").forEach(button => {
      button.addEventListener("click", () => {
        activeGroup = button.dataset.group;
        document.querySelectorAll(".tab-button").forEach(item => item.classList.toggle("active", item === button));
        closeDrawer();
        render();
      });
    });

    document.getElementById("drawer-close").addEventListener("click", closeDrawer);
    backdrop.addEventListener("click", closeDrawer);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeDrawer();
    });

    render();
  </script>
</body>
</html>
